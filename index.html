// ═══════════════════════════════════════════════════════════════════
// SUPABASE REST API — sem dependência de biblioteca, puro fetch
// Troque SUPABASE_URL e SUPABASE_ANON_KEY pelas suas credenciais
// ou deixe em branco: a tela de configuração pedirá no primeiro acesso
// ═══════════════════════════════════════════════════════════════════
const buildApi=(url,key)=>{
  const hdr={
    'apikey':key,
    'Authorization':`Bearer ${key}`,
    'Content-Type':'application/json',
    'Prefer':'return=representation'
  };
  return async(endpoint,method='GET',body=null)=>{
    const r=await fetch(`${url}/rest/v1/${endpoint}`,{
      method,headers:hdr,...(body?{body:JSON.stringify(body)}:{})
    });
    if(r.status===204||r.status===200&&method==='DELETE')return[];
    const d=await r.json();
    if(!r.ok)throw new Error(d?.message||d?.hint||`Erro ${r.status}`);
    return Array.isArray(d)?d:[d];
  };
};

// ═══════════════════════════════════════════════════════════
const fmt$=(v)=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
const fmtDate=(d)=>{
  if(!d)return'—';
  const[y,m,day]=d.split('-');
  return`${day}/${m}/${y}`;
};
const todayStr=()=>{
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const uid=()=>Math.random().toString(36).slice(2,10);

const Ic=({n,size=20,cls='',sw=2})=>React.createElement('svg',{
  xmlns:'http://www.w3.org/2000/svg',width:size,height:size,
  viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',
  strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round',

});

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
function useToast(){
  const[list,set]=useState([]);
  const add=useCallback((msg,type='ok')=>{
    const id=uid();
    set(l=>[...l,{id,msg,type}]);
    setTimeout(()=>set(l=>l.filter(x=>x.id!==id)),3200);
  },[]);
  return[list,add];
}

function Toasts({list}){
  const cfg={ok:{bg:'bg-green-500',ic:'Check'},error:{bg:'bg-red-500',ic:'X'},warn:{bg:'bg-amber-400',ic:'Alert'}};
  return(
    <div className="fixed top-4 inset-x-4 z-[9999] flex flex-col gap-2 pointer-events-none">
      {list.map(t=>(
        <div key={t.id} className={`toast-in ${cfg[t.type]?.bg||'bg-gray-800'} text-white rounded-2xl px-4 py-3 flex items-center gap-2.5 shadow-xl`}>
          <Ic n={cfg[t.type]?.ic||'Info'} size={16}/>
          <span className="text-sm font-semibold">{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// SHARED UI COMPONENTS
// ═══════════════════════════════════════════════════════════
const Inp=({label,hint,...p})=>(
  <div>
    {label&&<label className="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1.5">{label}</label>}
    <input className="w-full border border-gray-200 rounded-2xl px-4 py-3.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent placeholder:text-gray-300 transition" {...p}/>
    {hint&&<p className="text-xs text-gray-400 mt-1">{hint}</p>}
  </div>
);

const Btn=({children,v='primary',sz='md',cls='',loading=false,...p})=>{
  const base='rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-[.97] disabled:opacity-50 disabled:pointer-events-none select-none';
  const vs={
    primary:'bg-brand-600 text-white hover:bg-brand-700 shadow-sm shadow-brand-200',
    danger:'bg-red-500 text-white hover:bg-red-600',
    outline:'border-2 border-gray-200 text-gray-700 hover:border-gray-300 hover:bg-gray-50',
    ghost:'text-gray-500 hover:bg-gray-100',
    green:'bg-green-50 text-green-700 border border-green-200 hover:bg-green-100',
  };
  const szs={sm:'px-3 py-2 text-xs',md:'px-5 py-3.5 text-sm',lg:'w-full px-5 py-4 text-base'};
  return(
    <button className={`${base} ${vs[v]} ${szs[sz]} ${cls}`} {...p}>
      {loading&&<Ic n="Refresh" size={16} cls="spin"/>}
      {children}
    </button>
  );
};

function Sheet({open,onClose,title,children,full=false}){
  if(!open)return null;
  return(
    <div className="fixed inset-0 z-50 flex items-end">
      <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}/>
      <div className={`relative bg-white rounded-t-[28px] w-full slide-up ${full?'h-[95vh]':'max-h-[90vh]'} flex flex-col shadow-2xl`}>
        <div className="flex-shrink-0 flex items-center justify-between px-5 pt-5 pb-4 border-b border-gray-100">
          <span className="text-base font-bold text-gray-900">{title}</span>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
            <Ic n="X" size={16} cls="text-gray-500"/>
          </button>
        </div>
        <div className="flex-1 overflow-y-auto p-5">{children}</div>
      </div>
    </div>
  );
}

function StatusBadge({status,due}){
  const td=todayStr();
  let cfg;
  if(status==='pago')cfg={cls:'bg-green-100 text-green-700',label:'✓ PAGO'};
  else if(due<td)cfg={cls:'bg-red-100 text-red-600',label:'ATRASADO'};
  else if(due===td)cfg={cls:'bg-amber-100 text-amber-700',label:'VENCE HOJE'};
  else cfg={cls:'bg-gray-100 text-gray-500',label:'PENDENTE'};
  return<span className={`text-[10px] font-bold px-2.5 py-1 rounded-full tracking-wide ${cfg.cls}`}>{cfg.label}</span>;
}

// ═══════════════════════════════════════════════════════════
// SETUP SCREEN
// ═══════════════════════════════════════════════════════════
function SetupScreen({onSave}){
  const[url,setUrl]=useState('');
  const[key,setKey]=useState('');
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');

  const connect=async()=>{
    if(!url.trim()||!key.trim()){setErr('Preencha os dois campos.');return;}
    setLoading(true);setErr('');
    try{
      await buildApi(url.trim(),key.trim())('produtos?limit=1');
      onSave({url:url.trim(),key:key.trim()});
    }catch(e){
      setErr('Não foi possível conectar. Verifique a URL e a chave anon, e se as tabelas foram criadas (veja o SQL no README).');
    }finally{setLoading(false);}
  };

  return(
    <div className="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-brand-600 via-brand-700 to-emerald-900 p-6">
      <div className="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-7 fade-in">
        <div className="text-center mb-8">
          <div className="w-20 h-20 bg-brand-50 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-inner">
            <Ic n="Wallet" size={36} cls="text-brand-600"/>
          </div>
          <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight"> GRSI App</h1>
          <p className="text-gray-400 text-sm mt-1.5">Gestão Rapida com Sistema Integrado</p>
        </div>

        <div className="space-y-4">
          <Inp label="URL DE ACESSO" value={url} onChange={e=>setUrl(e.target.value)} placeholder="Use URL fornecida"/>
          <Inp label="SUA KEY DE ACESSO" value={key} onChange={e=>setKey(e.target.value)} placeholder="Use a senha fornecida" type="password"/>
          {err&&<div className="bg-red-50 border border-red-200 rounded-2xl px-4 py-3 text-xs text-red-600">{err}</div>}
          <Btn v="primary" sz="lg" onClick={connect} loading={loading} disabled={loading}>
            {!loading&&<Ic n="Check" size={18}/>}
            {loading?'Conectando...':'Conectar'}
          </Btn>
        </div>

        <div className="mt-6 bg-gray-50 rounded-2xl p-4 text-xs text-gray-500 space-y-1.5">
          <p className="font-bold text-gray-700 flex items-center gap-1.5"><Ic n="Info" size={13}/>Como obter as credenciais:</p>
          <p>1. Acesse  → <strong>https://near-rem.github.io/contatos.html</strong></p>
          <p>2. Entre em contato com o desenvolvedor</p>
          <p>3. <strong>Personalize e use </strong></p>
          <p>4. ATENÇÃO <em>75% OFF </em> POR TEMPO <em>LIMITADO</em></p>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ABA: ESTOQUE
// ═══════════════════════════════════════════════════════════
function EstoqueTab({api,toast}){
  const[produtos,setProdutos]=useState([]);
  const[loading,setLoading]=useState(true);
  const[sheet,setSheet]=useState(null);// null|'add'|produto
  const[search,setSearch]=useState('');
  const[form,setForm]=useState({nome:'',preco:'',quantidade:''});
  const[saving,setSaving]=useState(false);

  const load=useCallback(async()=>{
    setLoading(true);
    try{const d=await api('produtos?order=nome.asc');setProdutos(d);}
    catch(e){toast('Erro ao carregar: '+e.message,'error');}
    finally{setLoading(false);}
  },[api]);

  useEffect(()=>{load();},[load]);

  const openAdd=()=>{setForm({nome:'',preco:'',quantidade:''});setSheet('add');};
  const openEdit=(p)=>{setForm({nome:p.nome,preco:p.preco,quantidade:p.quantidade});setSheet(p);};

  const salvar=async()=>{
    if(!form.nome.trim()||!form.preco||form.quantidade===''){toast('Preencha todos os campos','warn');return;}
    setSaving(true);
    try{
      if(sheet==='add'){
        await api('produtos','POST',{nome:form.nome.trim(),preco:+form.preco,quantidade:+form.quantidade});
        toast('Produto adicionado!');
      }else{
        await api(`produtos?id=eq.${sheet.id}`,'PATCH',{nome:form.nome.trim(),preco:+form.preco,quantidade:+form.quantidade});
        toast('Produto atualizado!');
      }
      setSheet(null);load();
    }catch(e){toast('Erro: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const excluir=async(p)=>{
    if(!confirm(`Excluir "${p.nome}"?`))return;
    try{await api(`produtos?id=eq.${p.id}`,'DELETE');toast('Removido');load();}
    catch(e){toast('Erro ao excluir','error');}
  };

  const F=produtos.filter(p=>p.nome.toLowerCase().includes(search.toLowerCase()));

  return(
    <div className="flex flex-col h-full">
      {/* Header */}
      <div className="bg-brand-600 pt-safe px-4 pb-4">
        <div className="flex items-center justify-between mb-3">
          <h1 className="text-xl font-extrabold text-white">Estoque</h1>
          <button onClick={load} className="p-2 bg-brand-700 rounded-xl">
            <Ic n="Refresh" size={16} cls={`text-white${loading?' spin':''}`}/>
          </button>
        </div>
        <div className="relative">
          <Ic n="Search" size={15} cls="absolute left-3.5 top-1/2 -translate-y-1/2 text-white/50"/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar produto..." className="w-full bg-white/15 border border-white/20 text-white placeholder:text-white/50 rounded-2xl pl-10 pr-4 py-2.5 text-sm outline-none focus:bg-white/25"/>
        </div>
      </div>

      {/* Summary bar */}
      {!loading&&(
        <div className="bg-white border-b border-gray-100 flex divide-x text-center">
          <div className="flex-1 py-2.5">
            <p className="text-lg font-extrabold text-gray-800">{produtos.length}</p>
            <p className="text-[10px] text-gray-400 uppercase tracking-wide">Produtos</p>
          </div>
          <div className="flex-1 py-2.5">
            <p className="text-lg font-extrabold text-amber-500">{produtos.filter(p=>p.quantidade<=5&&p.quantidade>0).length}</p>
            <p className="text-[10px] text-gray-400 uppercase tracking-wide">Baixo Est.</p>
          </div>
          <div className="flex-1 py-2.5">
            <p className="text-lg font-extrabold text-red-500">{produtos.filter(p=>p.quantidade===0).length}</p>
            <p className="text-[10px] text-gray-400 uppercase tracking-wide">Zerados</p>
          </div>
        </div>
      )}

      {/* List */}
      <div className="flex-1 overflow-y-auto p-4 space-y-2.5 pb-28">
        {loading?(
          <div className="flex justify-center items-center py-20"><Ic n="Refresh" size={28} cls="text-gray-300 spin"/></div>
        ):F.length===0?(
          <div className="flex flex-col items-center justify-center py-20 text-gray-300">
            <Ic n="Package" size={44} cls="mb-3"/>
            <p className="font-bold text-gray-400">{search?'Nenhum resultado':'Estoque vazio'}</p>
            <p className="text-sm text-gray-300 mt-1">Toque no + para adicionar</p>
          </div>
        ):F.map(p=>(
          <div key={p.id} className={`bg-white rounded-2xl p-4 flex items-center gap-3 receipt-shadow border ${p.quantidade===0?'border-red-200':p.quantidade<=5?'border-amber-200':'border-transparent'}`}>
            <div className={`w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0 ${p.quantidade===0?'bg-red-50':p.quantidade<=5?'bg-amber-50':'bg-brand-50'}`}>
              <Ic n="Package" size={20} cls={p.quantidade===0?'text-red-400':p.quantidade<=5?'text-amber-500':'text-brand-500'}/>
            </div>
            <div className="flex-1 min-w-0">
              <p className="font-bold text-gray-900 text-sm truncate">{p.nome}</p>
              <p className="text-brand-600 font-bold text-sm mt-0.5">{fmt$(p.preco)}</p>
              <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${p.quantidade===0?'bg-red-100 text-red-600':p.quantidade<=5?'bg-amber-100 text-amber-600':'bg-gray-100 text-gray-500'}`}>
                {p.quantidade===0?'SEM ESTOQUE':p.quantidade<=5?`⚠ ${p.quantidade} un.`:`${p.quantidade} unid.`}
              </span>
            </div>
            <div className="flex gap-1.5">
              <button onClick={()=>openEdit(p)} className="w-9 h-9 rounded-xl bg-blue-50 flex items-center justify-center">
                <Ic n="Edit" size={15} cls="text-blue-500"/>
              </button>
              <button onClick={()=>excluir(p)} className="w-9 h-9 rounded-xl bg-red-50 flex items-center justify-center">
                <Ic n="Trash" size={15} cls="text-red-400"/>
              </button>
            </div>
          </div>
        ))}
      </div>

      {/* FAB */}
      <button onClick={openAdd} className="fixed bottom-24 right-4 w-14 h-14 bg-brand-600 text-white rounded-2xl shadow-xl shadow-brand-200 flex items-center justify-center z-20 active:scale-95">
        <Ic n="Plus" size={26}/>
      </button>

      {/* Sheet: Add/Edit */}
      <Sheet open={!!sheet} onClose={()=>setSheet(null)} title={sheet==='add'?'Novo Produto':'Editar Produto'}>
        <div className="space-y-4">
          <Inp label="Nome do produto" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} placeholder="Ex: Refrigerante 2L"/>
          <div className="grid grid-cols-2 gap-3">
            <Inp label="Preço (R$)" type="number" step="0.01" min="0" value={form.preco} onChange={e=>setForm({...form,preco:e.target.value})} placeholder="0,00"/>
            <Inp label="Quantidade" type="number" min="0" value={form.quantidade} onChange={e=>setForm({...form,quantidade:e.target.value})} placeholder="0"/>
          </div>
          <Btn v="primary" sz="lg" onClick={salvar} loading={saving} disabled={saving}>
            {!saving&&<Ic n="Check" size={18}/>}
            {sheet==='add'?'Adicionar Produto':'Salvar Alterações'}
          </Btn>
        </div>
      </Sheet>
    </div>
  );
}

// ABA: NOVA VENDA (wizard 3 etapas)
// ═══════════════════════════════════════════════════════════
function VendaTab({api,toast,onVendaCriada}){
  const[etapa,setEtapa]=useState(1);
  const[produtos,setProdutos]=useState([]);
  const[cliente,setCliente]=useState({nome:'',telefone:''});
  const[carrinho,setCarrinho]=useState([]);
  const[datas,setDatas]=useState({data_venda:todayStr(),data_vencimento:''});
  const[obs,setObs]=useState('');
  const[search,setSearch]=useState('');
  const[saving,setSaving]=useState(false);
  const[venda,setVenda]=useState(null);// recibo
  const receiptRef=useRef(null);

  useEffect(()=>{
    api('produtos?order=nome.asc').then(setProdutos).catch(()=>{});
  },[api]);

  const addItem=(p)=>{
    const ex=carrinho.find(c=>c.id===p.id);
    const qtAtual=ex?ex.qty:0;
    if(qtAtual>=p.quantidade){toast('Estoque insuficiente','warn');return;}
    setCarrinho(ex
      ?carrinho.map(c=>c.id===p.id?{...c,qty:c.qty+1}:c)
      :[...carrinho,{...p,qty:1}]
    );
  };

  const setQty=(id,v)=>{
    if(v<=0)setCarrinho(carrinho.filter(c=>c.id!==id));
    else{
      const p=carrinho.find(c=>c.id===id);
      if(!p)return;
      if(v>p.quantidade){toast('Estoque insuficiente','warn');return;}
      setCarrinho(carrinho.map(c=>c.id===id?{...c,qty:v}:c));
    }
  };

  const total=carrinho.reduce((s,c)=>s+c.preco*c.qty,0);

  const finalizar=async()=>{
    if(!cliente.nome.trim()){toast('Informe o nome do cliente','warn');return;}
    if(carrinho.length===0){toast('Carrinho vazio','warn');return;}
    if(!datas.data_vencimento){toast('Informe a data de vencimento','warn');return;}
    setSaving(true);
    try{
      const[v]=await api('vendas','POST',{
        cliente_nome:cliente.nome.trim(),
        cliente_telefone:cliente.telefone.trim()||null,
        total,
        data_venda:datas.data_venda,
        data_vencimento:datas.data_vencimento,
        status:'pendente',
        observacao:obs.trim()||null
      });
      for(const item of carrinho){
        await api('itens_venda','POST',{
          venda_id:v.id,produto_id:item.id,
          produto_nome:item.nome,quantidade:item.qty,
          preco_unitario:item.preco,subtotal:item.preco*item.qty
        });
        // decrementar estoque
        const prod=produtos.find(p=>p.id===item.id);
        if(prod)await api(`produtos?id=eq.${item.id}`,'PATCH',{quantidade:prod.quantidade-item.qty});
      }
      toast('Venda registrada!');
      setVenda({v,cliente,carrinho,total,datas,obs});
      onVendaCriada();
    }catch(e){toast('Erro: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const reset=()=>{
    setEtapa(1);setCliente({nome:'',telefone:''});setCarrinho([]);
    setDatas({data_venda:todayStr(),data_vencimento:''});setObs('');setVenda(null);
    api('produtos?order=nome.asc').then(setProdutos).catch(()=>{});
  };

  if(venda)return<Recibo data={venda} rRef={receiptRef} onNova={reset} toast={toast}/>;

  const filtrados=produtos.filter(p=>p.nome.toLowerCase().includes(search.toLowerCase()));

  const Step=({n,l})=>(
    <div className={`flex-1 flex flex-col items-center gap-1`}>
      <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-all ${etapa>n?'bg-white text-brand-700':etapa===n?'bg-white text-brand-700':'bg-white/20 text-white/50'}`}>
        {etapa>n?<Ic n="Check" size={14}/>:n}
      </div>
      <span className={`text-[10px] font-semibold ${etapa>=n?'text-white':'text-white/40'}`}>{l}</span>
    </div>
  );

  return(
    <div className="flex flex-col h-full">
      {/* Header */}
      <div className="bg-brand-600 pt-safe px-4 pb-4">
        <h1 className="text-xl font-extrabold text-white mb-4">Nova Venda</h1>
        <div className="flex items-center gap-2">
          <Step n={1} l="Cliente"/>
          <div className={`flex-1 h-0.5 rounded-full ${etapa>1?'bg-white':'bg-white/20'}`}/>
          <Step n={2} l="Itens"/>
          <div className={`flex-1 h-0.5 rounded-full ${etapa>2?'bg-white':'bg-white/20'}`}/>
          <Step n={3} l="Confirmar"/>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto p-4 pb-28 space-y-3">

        {/* ETAPA 1: CLIENTE */}
        {etapa===1&&(
          <div className="fade-in space-y-4">
            <div className="bg-white rounded-3xl p-5 receipt-shadow space-y-4">
              <div className="flex items-center gap-2 mb-1">
                <div className="w-8 h-8 rounded-xl bg-brand-50 flex items-center justify-center">
                  <Ic n="User" size={16} cls="text-brand-600"/>
                </div>
                <p className="font-bold text-gray-800">Dados do Cliente</p>
              </div>
              <Inp label="Nome completo *" value={cliente.nome} onChange={e=>setCliente({...cliente,nome:e.target.value})} placeholder="Nome do cliente"/>
              <Inp label="WhatsApp (opcional)" type="tel" value={cliente.telefone} onChange={e=>setCliente({...cliente,telefone:e.target.value})} placeholder="(11) 99999-9999" hint="Usado para cobrar via WhatsApp"/>
            </div>
            <Btn v="primary" sz="lg" onClick={()=>{if(!cliente.nome.trim()){toast('Informe o nome','warn');return;}setEtapa(2);}}>
              Próximo: Adicionar Itens <Ic n="Right" size={18}/>
            </Btn>
          </div>
        )}

        {/* ETAPA 2: ITENS */}
        {etapa===2&&(
          <div className="fade-in space-y-3">
            {carrinho.length>0&&(
              <div className="bg-white rounded-3xl receipt-shadow overflow-hidden">
                <div className="flex items-center justify-between px-4 py-3 bg-brand-50 border-b border-brand-100">
                  <span className="font-bold text-brand-700 text-sm">Carrinho ({carrinho.length})</span>
                  <span className="font-extrabold text-brand-700">{fmt$(total)}</span>
                </div>
                {carrinho.map(c=>(
                  <div key={c.id} className="flex items-center gap-3 px-4 py-3 border-b border-gray-50 last:border-0">
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-bold text-gray-900 truncate">{c.nome}</p>
                      <p className="text-xs text-gray-400">{fmt$(c.preco)} × {c.qty} = <strong className="text-brand-600">{fmt$(c.preco*c.qty)}</strong></p>
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                      <button onClick={()=>setQty(c.id,c.qty-1)} className="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 font-black text-base leading-none">−</button>
                      <span className="w-5 text-center text-sm font-bold">{c.qty}</span>
                      <button onClick={()=>setQty(c.id,c.qty+1)} className="w-7 h-7 rounded-full bg-brand-100 flex items-center justify-center text-brand-700 font-black text-base leading-none">+</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            <div className="relative">
              <Ic n="Search" size={15} cls="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"/>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar produto..." className="w-full bg-white border border-gray-200 rounded-2xl pl-10 pr-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand-400 receipt-shadow"/>
            </div>

            {filtrados.length===0&&(
              <div className="text-center py-8 text-gray-300">
                <Ic n="Slash" size={32} cls="mx-auto mb-2"/>
                <p className="text-sm">Nenhum produto encontrado</p>
              </div>
            )}

            <div className="space-y-2">
              {filtrados.map(p=>(
                <div key={p.id} className={`bg-white rounded-2xl p-3.5 flex items-center gap-3 receipt-shadow ${p.quantidade===0?'opacity-40':''}`}>
                  <div className="flex-1 min-w-0">
                    <p className="font-bold text-sm text-gray-900 truncate">{p.nome}</p>
                    <p className="text-xs text-brand-600 font-bold mt-0.5">{fmt$(p.preco)} <span className="text-gray-300 font-normal">· {p.quantidade} disp.</span></p>
                  </div>
                  <button onClick={()=>addItem(p)} disabled={p.quantidade===0} className="w-9 h-9 bg-brand-600 text-white rounded-xl flex items-center justify-center active:scale-90 disabled:opacity-30">
                    <Ic n="Plus" size={18}/>
                  </button>
                </div>
              ))}
            </div>

            <div className="flex gap-3 pt-2">
              <Btn v="outline" sz="md" cls="flex-1" onClick={()=>setEtapa(1)}><Ic n="Back" size={16}/>Voltar</Btn>
              <Btn v="primary" sz="md" cls="flex-1" onClick={()=>{if(carrinho.length===0){toast('Adicione ao menos 1 item','warn');return;}setEtapa(3);}}>
                Confirmar <Ic n="Right" size={16}/>
              </Btn>
            </div>
          </div>
        )}

        {/* ETAPA 3: CONFIRMAR */}
        {etapa===3&&(
          <div className="fade-in space-y-4">
            <div className="bg-white rounded-3xl p-5 receipt-shadow space-y-4">
              <div className="flex items-center gap-2 mb-1">
                <div className="w-8 h-8 rounded-xl bg-brand-50 flex items-center justify-center">
                  <Ic n="Calendar" size={16} cls="text-brand-600"/>
                </div>
                <p className="font-bold text-gray-800">Datas</p>
              </div>
              <Inp label="Data da venda" type="date" value={datas.data_venda} onChange={e=>setDatas({...datas,data_venda:e.target.value})}/>
              <Inp label="Data de vencimento (cobrança) *" type="date" value={datas.data_vencimento} onChange={e=>setDatas({...datas,data_vencimento:e.target.value})}/>
              <div>
                <label className="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1.5">Observação</label>
                <textarea value={obs} onChange={e=>setObs(e.target.value)} rows={2} placeholder="Ex: parcelado, desconto combinado..." className="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none"/>
              </div>
            </div>

            {/* Resumo */}
            <div className="bg-brand-600 rounded-3xl p-5 text-white">
              <p className="text-brand-200 text-xs font-bold uppercase tracking-widest mb-3">Resumo</p>
              <div className="space-y-1.5 mb-4">
                {carrinho.map(c=>(
                  <div key={c.id} className="flex justify-between text-sm">
                    <span className="text-brand-100">{c.nome} × {c.qty}</span>
                    <span className="font-bold">{fmt$(c.preco*c.qty)}</span>
                  </div>
                ))}
              </div>
              <div className="border-t border-brand-500 pt-3 flex justify-between items-center">
                <span className="font-extrabold text-lg">TOTAL</span>
                <span className="font-extrabold text-2xl">{fmt$(total)}</span>
              </div>
            </div>

            <div className="flex gap-3">
              <Btn v="outline" sz="md" cls="flex-1" onClick={()=>setEtapa(2)}><Ic n="Back" size={16}/>Voltar</Btn>
              <Btn v="primary" sz="md" cls="flex-1" onClick={finalizar} loading={saving} disabled={saving}>
                {!saving&&<Ic n="Check" size={16}/>}
                {saving?'Salvando...':'Finalizar Venda'}
              </Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// RECIBO (NOTINHA)
// ═══════════════════════════════════════════════════════════
function Recibo({data,rRef,onNova,toast}){
  const{v,cliente,carrinho,total,datas,obs}=data;
  const[dl,setDl]=useState(false);

  const gerarImg=async()=>{
    if(!window.html2canvas){toast('Aguarde o carregamento','warn');return;}
    setDl(true);
    try{
      const el=rRef.current;
      const canvas=await window.html2canvas(el,{scale:3,backgroundColor:'#fff',useCORS:true,logging:false});
      return canvas;
    }catch(e){toast('Erro ao gerar imagem','error');return null;}
    finally{setDl(false);}
  };

  const baixar=async()=>{
    const c=await gerarImg();
    if(!c)return;
    const a=document.createElement('a');
    a.href=c.toDataURL('image/png');
    a.download=`recibo-${cliente.nome.replace(/\s+/g,'-').toLowerCase()}.png`;
    a.click();
    toast('Imagem salva!');
  };

  const compartilhar=async()=>{
    const c=await gerarImg();
    if(!c)return;
    c.toBlob(async blob=>{
      if(!blob)return;
      try{
        if(navigator.share&&navigator.canShare){
          const file=new File([blob],'recibo.png',{type:'image/png'});
          if(navigator.canShare({files:[file]})){
            await navigator.share({files:[file],title:`Recibo - ${cliente.nome}`,text:`Valor: ${fmt$(total)} | Vence: ${fmtDate(datas.data_vencimento)}`});
            return;
          }
        }
        // Fallback: download
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download='recibo.png';a.click();
        URL.revokeObjectURL(url);
      }catch(e){}
    },'image/png');
  };

  const pid=v.id.split('-')[0].toUpperCase();

  return(
    <div className="flex flex-col h-full bg-gray-100">
      <div className="bg-brand-600 pt-safe px-4 pb-4 flex items-center gap-3">
        <button onClick={onNova} className="w-9 h-9 bg-brand-700 rounded-xl flex items-center justify-center">
          <Ic n="Back" size={18} cls="text-white"/>
        </button>
        <h1 className="text-xl font-extrabold text-white flex items-center gap-2">
          <Ic n="CheckCircle" size={20}/> Venda Registrada!
        </h1>
      </div>

      <div className="flex-1 overflow-y-auto p-4 pb-28">
        {/* THE RECEIPT */}
        <div ref={rRef} className="bg-white mx-auto max-w-sm rounded-3xl overflow-hidden receipt-shadow" style={{fontFamily:'Plus Jakarta Sans, sans-serif'}}>
          {/* Cabeçalho */}
          <div className="bg-brand-600 px-6 pt-7 pb-6 text-center">
            <div className="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-3">
              <Ic n="Wallet" size={22} cls="text-white"/>
            </div>
            <p className="text-white font-extrabold text-xl tracking-tight">Minero do queijo</p>
            <p className="text-brand-200 text-xs mt-0.5">Comprovante de Venda</p>
          </div>

          {/* Info topo */}
          <div className="px-6 py-4 bg-brand-50 flex justify-between items-center border-b border-dashed border-brand-200">
            <div>
              <p className="text-[10px] text-brand-400 font-bold uppercase tracking-wide">Pedido Nº</p>
              <p className="text-brand-700 font-extrabold font-mono text-sm">{pid}</p>
            </div>
            <div className="text-right">
              <p className="text-[10px] text-brand-400 font-bold uppercase tracking-wide">Data</p>
              <p className="text-brand-700 font-bold text-sm">{fmtDate(datas.data_venda)}</p>
            </div>
          </div>

          {/* Cliente */}
          <div className="px-6 py-4 border-b border-dashed border-gray-200">
            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wide mb-1">Cliente</p>
            <p className="font-extrabold text-gray-900 text-base">{cliente.nome}</p>
            {cliente.telefone&&<p className="text-sm text-gray-500 mt-0.5">{cliente.telefone}</p>}
          </div>

          {/* Itens */}
          <div className="px-6 py-4 border-b border-dashed border-gray-200">
            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wide mb-3">Itens</p>
            <div className="space-y-2.5">
              {carrinho.map((c,i)=>(
                <div key={i} className="flex items-center justify-between">
                  <div>
                    <p className="text-sm font-bold text-gray-900">{c.nome}</p>
                    <p className="text-xs text-gray-400">{c.qty}× {fmt$(c.preco)}</p>
                  </div>
                  <p className="text-sm font-extrabold text-gray-900">{fmt$(c.preco*c.qty)}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Total */}
          <div className="px-6 py-5 bg-gray-50">
            <div className="flex justify-between items-center">
              <span className="text-gray-500 font-bold text-sm uppercase tracking-wide">Total</span>
              <span className="text-2xl font-extrabold text-brand-600">{fmt$(total)}</span>
            </div>
          </div>

          {/* Vencimento */}
          <div className="px-6 py-5 text-center border-t border-dashed border-gray-200">
            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Data de Vencimento</p>
            <p className="text-lg font-extrabold text-red-500 mt-1">{fmtDate(datas.data_vencimento)}</p>
            {obs&&<p className="text-xs text-gray-400 mt-2 italic">"{obs}"</p>}
          </div>

          {/* Rodapé */}
          <div className="px-6 py-4 bg-gray-50 border-t border-gray-100 text-center">
            <p className="text-[11px] text-gray-400">Gerado com GRSI App · GRSI.app</p>
            <div className="flex justify-center gap-0.5 mt-2">
              {Array(28).fill(0).map((_,i)=><span key={i} className="w-1 h-1 rounded-full bg-gray-200"/>)}
            </div>
          </div>
        </div>

        {/* Botões de ação */}
        <div className="mt-5 space-y-3 max-w-sm mx-auto">
          <Btn v="primary" sz="lg" onClick={compartilhar} loading={dl} disabled={dl}>
            {!dl&&<Ic n="Share" size={18}/>}
            Compartilhar via WhatsApp
          </Btn>
          <Btn v="outline" sz="lg" onClick={baixar} disabled={dl}>
            <Ic n="Download" size={18}/>
            Salvar como Imagem
          </Btn>
          <Btn v="ghost" sz="lg" onClick={onNova}>
            <Ic n="Plus" size={18}/>
            Nova Venda
          </Btn>
        </div>
      </div>
    </div>
  );
}

// ABA: ALERTAS
// ═══════════════════════════════════════════════════════════
function AlertasTab({api,toast,onAtualizar}){
  const[vendas,setVendas]=useState([]);
  const[loading,setLoading]=useState(true);

  const load=useCallback(async()=>{
    setLoading(true);
    try{
      const d=await api('vendas?status=eq.pendente&order=data_vencimento.asc');
      setVendas(d);
    }catch(e){toast('Erro: '+e.message,'error');}
    finally{setLoading(false);}
  },[api]);

  useEffect(()=>{load();},[load]);

  const marcarPago=async(id,nome)=>{
    try{
      await api(`vendas?id=eq.${id}`,'PATCH',{status:'pago'});
      toast(`${nome} — marcado como pago ✓`);
      load();onAtualizar();
    }catch(e){toast('Erro','error');}
  };

  const td=todayStr();
  const atrasadas=vendas.filter(v=>v.data_vencimento<td);
  const hoje=vendas.filter(v=>v.data_vencimento===td);
  const futuras=vendas.filter(v=>v.data_vencimento>td);

  const Card=({v,variant})=>{
    const isAtrasado=variant==='atrasada';
    const isHoje=variant==='hoje';
    return(
      <div className={`bg-white rounded-2xl p-4 receipt-shadow border-l-4 ${isAtrasado?'border-red-400':isHoje?'border-amber-400':'border-gray-200'}`}>
        <div className="flex items-start gap-3">
          <div className={`w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${isAtrasado?'bg-red-50':isHoje?'bg-amber-50':'bg-gray-50'}`}>
            <Ic n={isAtrasado?'Alert':isHoje?'Clock':'Calendar'} size={18} cls={isAtrasado?'text-red-500':isHoje?'text-amber-500':'text-gray-400'}/>
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 mb-1">
              <StatusBadge status={v.status} due={v.data_vencimento}/>
            </div>
            <p className="font-extrabold text-gray-900">{v.cliente_nome}</p>
            <p className="text-brand-600 font-bold">{fmt$(v.total)}</p>
            <p className="text-xs text-gray-400 mt-0.5">Vence: {fmtDate(v.data_vencimento)}</p>
            {v.observacao&&<p className="text-xs text-gray-400 italic mt-0.5">"{v.observacao}"</p>}
          </div>
          <button onClick={()=>marcarPago(v.id,v.cliente_nome)} className="w-10 h-10 bg-brand-100 rounded-xl flex items-center justify-center active:scale-90 flex-shrink-0" title="Marcar como pago">
            <Ic n="CheckCircle" size={20} cls="text-brand-600"/>
          </button>
        </div>
        {v.cliente_telefone&&(
          <a href={`https://wa.me/55${v.cliente_telefone.replace(/\D/g,'')}`} target="_blank" rel="noreferrer" className="mt-3 flex items-center gap-1.5 text-xs font-bold text-green-600 border border-green-200 bg-green-50 rounded-xl px-3 py-2">
            <Ic n="Phone" size={13}/>
            Cobrar via WhatsApp
          </a>
        )}
      </div>
    );
  };

  const Secao=({titulo,icon,items,variant,cor})=>items.length===0?null:(
    <div>
      <div className={`flex items-center gap-2 mb-2.5 px-1 ${cor}`}>
        <Ic n={icon} size={15}/>
        <p className="font-bold text-sm">{titulo} <span className="font-normal opacity-60">({items.length})</span></p>
      </div>
      <div className="space-y-2">{items.map(v=><Card key={v.id} v={v} variant={variant}/>)}</div>
    </div>
  );

  return(
    <div className="flex flex-col h-full">
      <div className="bg-brand-600 pt-safe px-4 pb-4">
        <div className="flex items-center justify-between">
          <h1 className="text-xl font-extrabold text-white">Alertas</h1>
          <button onClick={load} className="p-2 bg-brand-700 rounded-xl">
            <Ic n="Refresh" size={16} cls={`text-white${loading?' spin':''}`}/>
          </button>
        </div>
      </div>

      {/* Contadores */}
      <div className="bg-white border-b border-gray-100 grid grid-cols-3 divide-x">
        <div className="py-3 text-center">
          <p className="text-2xl font-extrabold text-red-500">{atrasadas.length}</p>
          <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wide">Atrasadas</p>
        </div>
        <div className="py-3 text-center">
          <p className="text-2xl font-extrabold text-amber-500">{hoje.length}</p>
          <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wide">Hoje</p>
        </div>
        <div className="py-3 text-center">
          <p className="text-2xl font-extrabold text-gray-500">{futuras.length}</p>
          <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wide">A Vencer</p>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto p-4 space-y-5 pb-24">
        {loading?(
          <div className="flex justify-center py-20"><Ic n="Refresh" size={28} cls="text-gray-300 spin"/></div>
        ):vendas.length===0?(
          <div className="flex flex-col items-center justify-center py-20 text-center">
            <div className="w-20 h-20 bg-brand-50 rounded-3xl flex items-center justify-center mx-auto mb-4">
              <Ic n="CheckCircle" size={36} cls="text-brand-500"/>
            </div>
            <p className="font-extrabold text-brand-600 text-lg">Tudo em dia!</p>
            <p className="text-sm text-gray-400 mt-1">Nenhuma cobrança pendente</p>
          </div>
        ):(
          <>
            <Secao titulo="Atrasadas" icon="Alert" items={atrasadas} variant="atrasada" cor="text-red-500"/>
            <Secao titulo="Vencem Hoje" icon="Clock" items={hoje} variant="hoje" cor="text-amber-500"/>
            <Secao titulo="A Vencer" icon="Calendar" items={futuras} variant="futura" cor="text-gray-500"/>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ABA: RELATÓRIOS
// ═══════════════════════════════════════════════════════════
function RelatoriosTab({api,toast}){
  const[vendas,setVendas]=useState([]);
  const[loading,setLoading]=useState(true);
  const[filtro,setFiltro]=useState('todos');
  const[itensSheet,setItensSheet]=useState(null);
  const[itensData,setItensData]=useState([]);

  const load=useCallback(async()=>{
    setLoading(true);
    try{const d=await api('vendas?order=data_vencimento.desc');setVendas(d);}
    catch(e){toast('Erro: '+e.message,'error');}
    finally{setLoading(false);}
  },[api]);

  useEffect(()=>{load();},[load]);

  const verItens=async(venda)=>{
    try{
      const d=await api(`itens_venda?venda_id=eq.${venda.id}&order=produto_nome.asc`);
      setItensData(d);setItensSheet(venda);
    }catch(e){toast('Erro ao buscar itens','error');}
  };

  const marcar=async(id,status)=>{
    try{
      await api(`vendas?id=eq.${id}`,'PATCH',{status});
      toast(status==='pago'?'Marcado como pago!':'Reaberto como pendente');
      load();
    }catch(e){toast('Erro','error');}
  };

  const excluir=async(id)=>{
    if(!confirm('Excluir esta venda permanentemente?'))return;
    try{
      await api(`itens_venda?venda_id=eq.${id}`,'DELETE');
      await api(`vendas?id=eq.${id}`,'DELETE');
      toast('Venda excluída');load();
    }catch(e){toast('Erro ao excluir','error');}
  };

  const td=todayStr();
  const totalPendente=vendas.filter(v=>v.status==='pendente').reduce((s,v)=>s+Number(v.total),0);
  const totalPago=vendas.filter(v=>v.status==='pago').reduce((s,v)=>s+Number(v.total),0);
  const filtradas=filtro==='todos'?vendas:vendas.filter(v=>v.status===filtro);

  return(
    <div className="flex flex-col h-full">
      <div className="bg-brand-600 pt-safe px-4 pb-4">
        <div className="flex items-center justify-between mb-0">
          <h1 className="text-xl font-extrabold text-white">Relatórios</h1>
          <button onClick={load} className="p-2 bg-brand-700 rounded-xl">
            <Ic n="Refresh" size={16} cls={`text-white${loading?' spin':''}`}/>
          </button>
        </div>
      </div>

      {/* Cards resumo */}
      <div className="bg-white border-b border-gray-100 grid grid-cols-3 divide-x">
        <div className="py-3 px-2 text-center">
          <p className="text-sm font-extrabold text-red-500 leading-tight">{fmt$(totalPendente)}</p>
          <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wide mt-0.5">A Receber</p>
        </div>
        <div className="py-3 px-2 text-center">
          <p className="text-sm font-extrabold text-brand-600 leading-tight">{fmt$(totalPago)}</p>
          <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wide mt-0.5">Recebido</p>
        </div>
        <div className="py-3 px-2 text-center">
          <p className="text-sm font-extrabold text-gray-700 leading-tight">{vendas.length}</p>
          <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wide mt-0.5">Vendas</p>
        </div>
      </div>

      {/* Filtros */}
      <div className="bg-white border-b border-gray-100 px-4 py-2.5 flex gap-2">
        {[['todos','Todos'],['pendente','Pendentes'],['pago','Pagos']].map(([v,l])=>(
          <button key={v} onClick={()=>setFiltro(v)} className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${filtro===v?'bg-brand-600 text-white':'bg-gray-100 text-gray-500'}`}>{l}</button>
        ))}
      </div>

      <div className="flex-1 overflow-y-auto p-4 space-y-2.5 pb-24">
        {loading?(
          <div className="flex justify-center py-20"><Ic n="Refresh" size={28} cls="text-gray-300 spin"/></div>
        ):filtradas.length===0?(
          <div className="flex flex-col items-center justify-center py-20 text-gray-300">
            <Ic n="Chart" size={40} cls="mb-3"/>
            <p className="font-bold text-gray-400">Nenhuma venda</p>
          </div>
        ):filtradas.map(v=>(
          <div key={v.id} className="bg-white rounded-2xl p-4 receipt-shadow">
            <div className="flex items-start gap-3">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                  <StatusBadge status={v.status} due={v.data_vencimento}/>
                </div>
                <p className="font-extrabold text-gray-900">{v.cliente_nome}</p>
                <p className="text-brand-600 font-bold">{fmt$(v.total)}</p>
                <p className="text-xs text-gray-400 mt-0.5">
                  Venda: {fmtDate(v.data_venda)} · Vence: {fmtDate(v.data_vencimento)}
                </p>
                {v.observacao&&<p className="text-xs text-gray-400 italic mt-0.5">"{v.observacao}"</p>}
              </div>
              <div className="flex flex-col gap-1.5">
                {v.status==='pendente'
                  ?<button onClick={()=>marcar(v.id,'pago')} className="w-9 h-9 bg-brand-100 rounded-xl flex items-center justify-center" title="Marcar pago"><Ic n="CheckCircle" size={18} cls="text-brand-600"/></button>
                  :<button onClick={()=>marcar(v.id,'pendente')} className="w-9 h-9 bg-gray-100 rounded-xl flex items-center justify-center" title="Reabrir"><Ic n="Refresh" size={16} cls="text-gray-500"/></button>
                }
                <button onClick={()=>excluir(v.id)} className="w-9 h-9 bg-red-50 rounded-xl flex items-center justify-center"><Ic n="Trash" size={16} cls="text-red-400"/></button>
              </div>
            </div>
            <div className="flex gap-2 mt-3">
              <button onClick={()=>verItens(v)} className="flex-1 flex items-center justify-center gap-1.5 text-xs font-bold text-brand-600 bg-brand-50 border border-brand-100 rounded-xl py-2">
                <Ic n="Receipt" size={13}/>Ver Itens
              </button>
              {v.cliente_telefone&&(
                <a href={`https://wa.me/55${v.cliente_telefone.replace(/\D/g,'')}`} target="_blank" rel="noreferrer" className="flex-1 flex items-center justify-center gap-1.5 text-xs font-bold text-green-600 bg-green-50 border border-green-100 rounded-xl py-2">
                  <Ic n="Phone" size={13}/>WhatsApp
                </a>
              )}
            </div>
          </div>
        ))}
      </div>

      {/* Sheet: Itens da venda */}
      <Sheet open={!!itensSheet} onClose={()=>setItensSheet(null)} title="Itens da Venda">
        {itensSheet&&(
          <div className="space-y-3">
            <div className="bg-gray-50 rounded-2xl p-3 text-sm space-y-1">
              <p><strong>{itensSheet.cliente_nome}</strong></p>
              <p className="text-gray-500">Venda: {fmtDate(itensSheet.data_venda)} · Vence: {fmtDate(itensSheet.data_vencimento)}</p>
            </div>
            {itensData.map(item=>(
              <div key={item.id} className="flex justify-between items-center bg-white border border-gray-100 rounded-2xl p-3.5">
                <div>
                  <p className="font-bold text-sm text-gray-900">{item.produto_nome}</p>
                  <p className="text-xs text-gray-400">{item.quantidade}× {fmt$(item.preco_unitario)}</p>
                </div>
                <p className="font-extrabold text-brand-600">{fmt$(item.subtotal)}</p>
              </div>
            ))}
            <div className="flex justify-between items-center border-t-2 border-brand-600 pt-3 mt-1">
              <span className="font-bold text-gray-700">TOTAL</span>
              <span className="font-extrabold text-xl text-brand-600">{fmt$(itensSheet.total)}</span>
            </div>
          </div>
        )}
      </Sheet>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// BARRA DE NAVEGAÇÃO INFERIOR
// ═══════════════════════════════════════════════════════════
function NavBar({aba,setAba,alertas}){
  const tabs=[
    {id:'estoque',icon:'Package',label:'Estoque'},
    {id:'venda',icon:'Cart',label:'Venda'},
    {id:'alertas',icon:'Bell',label:'Alertas',badge:alertas},
    {id:'relatorios',icon:'Chart',label:'Relatórios'},
  ];
  return(
    <nav className="fixed bottom-0 inset-x-0 bg-white border-t border-gray-100 z-30 pb-safe">
      <div className="flex max-w-lg mx-auto">
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setAba(t.id)} className={`flex-1 flex flex-col items-center py-2.5 gap-1 relative transition-colors ${aba===t.id?'text-brand-600':'text-gray-400'}`}>
            {aba===t.id&&<span className="absolute top-0 left-1/2 -translate-x-1/2 w-8 h-0.5 bg-brand-600 rounded-full"/>}
            <div className="relative">
              <Ic n={t.icon} size={22} sw={aba===t.id?2.5:1.8}/>
              {(t.badge||0)>0&&<span className="absolute -top-2 -right-2 min-w-[18px] h-[18px] bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center px-1">{t.badge>9?'9+':t.badge}</span>}
            </div>
            <span className="text-[10px] font-bold leading-none">{t.label}</span>
          </button>
        ))}
      </div>
    </nav>
  );
}

// ═══════════════════════════════════════════════════════════
// SETTINGS SHEET
// ═══════════════════════════════════════════════════════════
function ConfigSheet({open,onClose,config,onReset}){
  return(
    <Sheet open={open} onClose={onClose} title="Configurações">
      <div className="space-y-4">
        <div className="bg-gray-50 rounded-2xl p-4 font-mono text-xs text-gray-500 space-y-2">
          <p className="font-bold text-gray-700 font-sans mb-1">conectado</p>
          <p className="break-all">{config.url}</p>
          <p className="truncate">{config.key.slice(0,40)}…</p>
        </div>
        <Btn v="danger" sz="lg" onClick={()=>{if(confirm('Desconectar? Você precisará reconectar.'))onReset();}}>
          <Ic n="X" size={18}/> Desconectar
        </Btn>
        <Btn v="outline" sz="lg" onClick={onClose}>Fechar</Btn>
      </div>
    </Sheet>
  );
}

// ═══════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════
function App(){
  const[config,setConfig]=useState(()=>{
    try{const s=localStorage.getItem('fiado_config');return s?JSON.parse(s):null;}catch{return null;}
  });
  const[aba,setAba]=useState('estoque');
  const[alertas,setAlertas]=useState(0);
  const[settings,setSettings]=useState(false);
  const[toasts,toast]=useToast();

  const api=useMemo(()=>config?buildApi(config.url,config.key):null,[config]);

  const saveConfig=(c)=>{
    localStorage.setItem('fiado_config',JSON.stringify(c));
    setConfig(c);
  };

  const resetConfig=()=>{
    localStorage.removeItem('fiado_config');
    setConfig(null);setSettings(false);
  };

  const loadAlertas=useCallback(async()=>{
    if(!api)return;
    try{
      const td=todayStr();
      const d=await api(`vendas?status=eq.pendente&data_vencimento=lte.${td}`);
      setAlertas(d.length);
    }catch{}
  },[api]);

  useEffect(()=>{
    loadAlertas();
    const t=setInterval(loadAlertas,60000);
    return()=>clearInterval(t);
  },[loadAlertas]);

  if(!config)return<><Toasts list={toasts}/><SetupScreen onSave={saveConfig}/></>;

  return(
    <div className="h-full flex flex-col max-w-lg mx-auto bg-gray-50 relative">
      <Toasts list={toasts}/>

      {/* Botão settings (canto) */}
      <button onClick={()=>setSettings(true)} className="absolute top-3 right-4 z-20 p-2 bg-black/20 rounded-xl" style={{top:'max(12px, env(safe-area-inset-top))'}}>
        <Ic n="Settings" size={16} cls="text-white"/>
      </button>

      {/* Content */}
      <div className="flex-1 overflow-hidden">
        {aba==='estoque'&&<EstoqueTab api={api} toast={toast}/>}
        {aba==='venda'&&<VendaTab api={api} toast={toast} onVendaCriada={loadAlertas}/>}
        {aba==='alertas'&&<AlertasTab api={api} toast={toast} onAtualizar={loadAlertas}/>}
        {aba==='relatorios'&&<RelatoriosTab api={api} toast={toast}/>}
      </div>

      <NavBar aba={aba} setAba={setAba} alertas={alertas}/>
      <ConfigSheet open={settings} onClose={()=>setSettings(false)} config={config} onReset={resetConfig}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
